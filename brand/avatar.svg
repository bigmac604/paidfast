<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bgw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f2ff"/>
    </linearGradient>
  </defs>
  <!-- friendly light background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgw)"/>
  <rect x="14" y="14" width="996" height="996" rx="210" fill="none" stroke="#4f46e5" stroke-opacity="0.12" stroke-width="4"/>
  <!-- soft violet coin circle -->
  <circle cx="512" cy="512" r="330" fill="url(#violet)"/>
  <circle cx="512" cy="512" r="330" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="10"/>
  <!-- paper plane fused with a lightning bolt -->
  <!-- plane body -->
  <path d="M 300 560 L 760 330 L 620 700 L 540 580 Z" fill="#ffffff"/>
  <path d="M 300 560 L 540 580 L 500 700 Z" fill="#e0dcff"/>
  <!-- lightning bolt cut through -->
  <path d="M 596 366 L 468 528 h 74 l -58 148 158 -196 h -80 z" fill="url(#violet)" stroke="#ffffff" stroke-width="14" stroke-linejoin="round"/>
  <!-- speed dashes -->
  <g stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.85">
    <line x1="218" y1="452" x2="316" y2="452"/>
    <line x1="186" y1="512" x2="268" y2="512"/>
  </g>
</svg>
